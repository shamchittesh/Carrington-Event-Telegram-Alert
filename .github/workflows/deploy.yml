name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests before deployment
      run: |
        pytest -v

    - name: Build Docker image (example)
      run: |
        echo "FROM python:3.13-slim" > Dockerfile
        echo "WORKDIR /app" >> Dockerfile
        echo "COPY requirements.txt ." >> Dockerfile
        echo "RUN pip install --no-cache-dir -r requirements.txt" >> Dockerfile
        echo "COPY . ." >> Dockerfile
        echo "CMD [\"python\", \"main.py\"]" >> Dockerfile
        
        # Build image (you'd typically push to a registry here)
        docker build -t carringtonwatch:latest .

    # Example deployment steps (uncomment and configure as needed):
