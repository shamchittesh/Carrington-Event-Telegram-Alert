name: Test Matrix

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test import of all modules
      run: |
        python -c "import src.config; print('✅ config')"
        python -c "import src.collector; print('✅ collector')"  
        python -c "import src.analyzer; print('✅ analyzer')"
        python -c "import src.notifier; print('✅ notifier')"
        python -c "import src.scheduler; print('✅ scheduler')"
        python -c "import src.state; print('✅ state')"

    - name: Run tests
      run: |
        pytest -v --tb=short

    - name: Test configuration loading
      run: |
        python -c "
        import os
        os.environ['TELEGRAM_BOT_TOKEN'] = 'test-token'
        os.environ['TELEGRAM_CHAT_ID'] = 'test-chat-id'
        from src.config import load_config, validate_config
        config = load_config()
        errors = validate_config(config)
        print(f'Config validation: {len(errors)} errors')
        assert len(errors) == 0, f'Config errors: {errors}'
        print('✅ Configuration validation passed')
        "